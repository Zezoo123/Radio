name: Build Windows

# Builds the Windows installer (.exe) and a portable .exe on a real Windows
# runner — the most reliable way to produce a clean standalone build.
# Trigger manually (Actions tab → Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  # Lets the release step attach the .exe files to the tag's Release.
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # --publish never: on tag builds electron-builder tries to publish a
      # GitHub release itself (and dies without GH_TOKEN); the release is
      # attached by the dedicated step below instead.
      - name: Build Windows installer + portable
        run: npm run build:win -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radio-scheduler-windows
          path: |
            dist/*.exe
          if-no-files-found: error

      # Attach the binaries to a GitHub Release when built from a tag.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
